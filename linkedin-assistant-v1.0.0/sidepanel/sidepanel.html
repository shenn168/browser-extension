<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="sidepanel.css">
  <title>LinkedLens Library</title>
</head>
<body>
  <div class="ll-sidepanel">
    <!-- Header -->
    <div class="ll-sp-header">
      <div class="ll-sp-title">
        <span class="ll-sp-icon">📚</span>
        <h1>Library</h1>
      </div>
      <div class="ll-sp-stats">
        <span id="sp-count">0 posts</span>
      </div>
    </div>

    <!-- Search & Filter -->
    <div class="ll-sp-toolbar">
      <div class="ll-sp-search-wrap">
        <span class="ll-sp-search-icon">🔍</span>
        <input type="text" id="sp-search" class="ll-sp-search" placeholder="Search saved posts...">
      </div>
      <div class="ll-sp-filters">
        <select id="sp-category" class="ll-sp-select">
          <option value="all">All Categories</option>
          <option value="Leadership">Leadership</option>
          <option value="Technology">Technology</option>
          <option value="Career">Career</option>
          <option value="Marketing">Marketing</option>
          <option value="Startup">Startup</option>
          <option value="Finance">Finance</option>
          <option value="Productivity">Productivity</option>
          <option value="General">General</option>
        </select>
        <select id="sp-sort" class="ll-sp-select">
          <option value="newest">Newest First</option>
          <option value="oldest">Oldest First</option>
          <option value="author">By Author</option>
        </select>
      </div>
    </div>

    <!-- Posts List -->
    <div class="ll-sp-list" id="sp-list">
      <div class="ll-sp-loading">Loading library...</div>
    </div>

    <!-- Empty State -->
    <div class="ll-sp-empty ll-hidden" id="sp-empty">
      <div class="ll-sp-empty-icon">📭</div>
      <div class="ll-sp-empty-title">No saved posts yet</div>
      <div class="ll-sp-empty-text">Click 🔖 on any post in your feed or press <kbd>S</kbd> to start saving.</div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
